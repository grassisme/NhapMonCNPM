# File cấu hình kết nối SQL Server cho toàn nhóm.
# Đặt tại: src/main/resources/db.properties
# Mỗi máy/mỗi thành viên trong nhóm chỉnh giá trị cho khớp máy mình,
# KHÔNG sửa file DBConnection.java.

# URL kết nối JDBC:
#   - localhost:1433        : SQL Server chạy trên máy local, port mặc định 1433
#   - databaseName=QLXNH    : tên CSDL đã tạo bằng qlxnh_database.sql
#   - encrypt=true & trustServerCertificate=true : bắt buộc cho mssql-jdbc 12+
db.url=jdbc:sqlserver://LAPTOP-OIUIOQ6B\\CLCCSDLPTNHOM4;databaseName=QLXNH;trustServerCertificate=true;encrypt=false

# SQL Authentication (KHÔNG phải Windows Auth):
# Trong SSMS lúc cài SQL Server đã chọn Mixed Mode và đặt password cho user sa.
db.user=sa
db.password=123456
